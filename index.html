<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi página</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5f5f5;
      margin: 0;
      padding: 40px;
    }

    img{
      max-width: 300px;
      border-radius: 12px;
    }

    .container{
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    a{
      display: inline-block;
      margin: 10px;
      padding: 10px 16px;
      text-decoration: none;
      background: black;
      color: white;
      border-radius: 8px;
    }

    section{
      margin-top: 60px;
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="tu-imagen.jpg" alt="imagen">

    <h1>Título</h1>
    <p>Este es un pequeño texto de tu página.</p>

    <a href="https://open.spotify.com/playlist/TU_PLAYLIST" target="_blank">
      Escuchar playlist
    </a>

    <a href="#letras">
      Ver letras
    </a>
  </div>

  <section id="letras">
    <h2>Letras</h2>
    <p>
      Aquí puedes poner las letras de las canciones.<br>
      Canción 1...<br><br>
      Canción 2...
    </p>
  </section>

</body>
</html>
